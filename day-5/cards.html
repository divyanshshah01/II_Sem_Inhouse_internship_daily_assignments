<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Cards Grid</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* The Card Grid Container */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Individual Card Styling */
        .card {
            background: #ffffff;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #eef2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .avatar {
            width: 60px;
            height: 60px;
            background-color: #e0f2fe;
            color: #0369a1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 16px;
        }

        .card h3 {
            margin: 0 0 8px 0;
            color: #1e293b;
            font-size: 1.15rem;
        }

        .card p {
            margin: 0;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="user-grid" class="card-grid"></div>

    <script>
        const gridContainer = document.getElementById('user-grid');

        // URL from your image (Note: Fixed the slight typo 'jsonplaceholders' -> 'jsonplaceholder')
        fetch('https://jsonplaceholder.typicode.com/users')
            .then(res => res.json())
            .then(data => {
                // Mapping through the users to create and inject HTML elements dynamically
                data.forEach(user => {
                    // Create card element
                    const card = document.createElement('div');
                    card.classList.add('card');
                    const avatarURL = 'https://xsgames.co/randomusers/avatar.php?g=pixel&key=${user.id}';

                    // Generate user card HTML structure
                    card.innerHTML = `
                        <div class="avatar">${user.username.charAt(0).toUpperCase()}</div>
                        <h3>${user.name}</h3>
                        <p>@${user.username}</p>
                    `
                    // Append card to grid container
                    gridContainer.appendChild(card);
                });
            })
            .catch(error => console.error('Error fetching data:', error));
    </script>
</body>
</html>
